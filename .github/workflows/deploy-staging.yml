# Deploys the latest code to the staging server on the VPS.
# Secrets are fetched at runtime from Google Secret Manager (not from GitHub Secrets).
name: Deploy to Staging

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "staging"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.14.0]

    steps:
    - name: Preserve live bundles before checkout
      run: |
        mkdir -p /tmp/thingspool-live-bundles/server /tmp/thingspool-live-bundles/client
        cp dist/server/bundle.live.js /tmp/thingspool-live-bundles/server/ || true
        cp dist/client/bundle.live.js /tmp/thingspool-live-bundles/client/ || true
        cp dist/client/style.live.css /tmp/thingspool-live-bundles/client/ || true

    - uses: actions/checkout@v4

    - name: Restore live bundles after checkout
      run: |
        cp /tmp/thingspool-live-bundles/server/bundle.live.js dist/server/ || true
        cp /tmp/thingspool-live-bundles/client/bundle.live.js dist/client/ || true
        cp /tmp/thingspool-live-bundles/client/style.live.css dist/client/ || true
        rm -rf /tmp/thingspool-live-bundles

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      env:
        EXCLUDE_SHARP: "true"
      run: npm run build

    - name: Remove sharp before runtime
      # `sharp` is an optional dep used only by the local SSG image-map step, which
      # never runs on the VPS (SKIP_SSG=true in prod). Its prebuilt linux-x64 binary
      # also requires an x86-64-v2 CPU the VPS does not have, so leaving it on disk
      # is a loaded gun if anything ever require()s it. Remove it after the build,
      # which needs sharp's TypeScript types to compile.
      #
      # Do NOT use `npm prune --omit=optional` here: that prunes optional deps
      # tree-wide, including `@google-cloud/firestore` (an optionalDependency of
      # `firebase-admin` that we very much DO need at runtime).
      run: rm -rf node_modules/sharp

    - name: Restart staging server
      run: pm2 startOrRestart ecosystem.config.js --only staging

    - name: Verify deployment
      run: |
        sleep 5
        pm2 status staging
